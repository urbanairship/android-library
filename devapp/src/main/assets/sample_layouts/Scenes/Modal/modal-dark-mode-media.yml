---
version: 1
presentation:
  type: modal
  dismiss_on_touch_outside: true
  default_placement:
    size:
      width: 88%
      height: auto
    position:
      horizontal: center
      vertical: center
    shade_color:
      default:
        hex: "#000000"
        alpha: 0.5
    border:
      radius: 16
      stroke_width: 1
      stroke_color:
        default:
          hex: "#E0E0E0"
          alpha: 1
        selectors:
          - dark_mode: true
            color:
              hex: "#3A3A3C"
              alpha: 1
    background_color:
      default:
        hex: "#FFFFFF"
        alpha: 1
      selectors:
        - dark_mode: true
          color:
            hex: "#1C1C1E"
            alpha: 1
view:
  type: state_controller
  view:
    type: linear_layout
    direction: vertical
    items:
      # Hero media — swaps url + url_selectors via view_overrides when alt=true
      - size:
          width: 100%
          height: 220
        view:
          type: media
          url: "https://picsum.photos/seed/sunny/800/440"
          url_selectors:
            - dark_mode: true
              url: "https://picsum.photos/seed/night/800/440"
          view_overrides:
            url:
              - when_state_matches:
                  key: alt
                  value:
                    equals: true
                value: "https://picsum.photos/seed/ocean/800/440"
            url_selectors:
              - when_state_matches:
                  key: alt
                  value:
                    equals: true
                value:
                  - dark_mode: true
                    url: "https://picsum.photos/seed/cave/800/440"
          media_type: image
          media_fit: fit_crop
          position:
            horizontal: center
            vertical: center
          border:
            corner_radius:
              top_left: 16
              top_right: 16
              bottom_left: 0
              bottom_right: 0

      - size:
          width: 100%
          height: auto
        margin:
          top: 20
          bottom: 8
          start: 24
          end: 24
        view:
          type: label
          text: "Adapt to Every Environment"
          text_appearance:
            font_size: 20
            alignment: center
            styles: [bold]
            color:
              default:
                hex: "#1A1A1A"
                alpha: 1
              selectors:
                - dark_mode: true
                  color:
                    hex: "#F2F2F7"
                    alpha: 1

      - size:
          width: 100%
          height: auto
        margin:
          top: 8
          bottom: 16
          start: 24
          end: 24
        view:
          type: label
          text: "Toggle dark mode above to see images swap. Use the checkbox to switch image sets."
          text_appearance:
            font_size: 15
            alignment: center
            color:
              default:
                hex: "#6B6B6B"
                alpha: 1
              selectors:
                - dark_mode: true
                  color:
                    hex: "#AEAEB2"
                    alpha: 1

      # Toggle buttons — one visible at a time, swapped by state
      - size:
          width: 100%
          height: auto
        margin:
          bottom: 16
          start: 24
          end: 24
        view:
          type: linear_layout
          direction: horizontal
          items:
            - size:
                width: auto
                height: 36
              view:
                type: label_button
                identifier: toggle_on
                background_color:
                  default:
                    hex: "#F2F2F7"
                    alpha: 1
                  selectors:
                    - dark_mode: true
                      color:
                        hex: "#2C2C2E"
                        alpha: 1
                border:
                  radius: 8
                event_handlers:
                  - type: tap
                    state_actions:
                      - type: set
                        key: alt
                        value: true
                visibility:
                  default: true
                  invert_when_state_matches:
                    key: alt
                    value:
                      equals: true
                label:
                  type: label
                  text: "Use alternate images"
                  text_appearance:
                    font_size: 14
                    alignment: center
                    color:
                      default:
                        hex: "#1A1A1A"
                        alpha: 1
                      selectors:
                        - dark_mode: true
                          color:
                            hex: "#F2F2F7"
                            alpha: 1
            - size:
                width: auto
                height: 36
              view:
                type: label_button
                identifier: toggle_off
                background_color:
                  default:
                    hex: "#007AFF"
                    alpha: 1
                border:
                  radius: 8
                event_handlers:
                  - type: tap
                    state_actions:
                      - type: set
                        key: alt
                        value: false
                visibility:
                  default: false
                  invert_when_state_matches:
                    key: alt
                    value:
                      equals: true
                label:
                  type: label
                  text: "Use alternate images"
                  text_appearance:
                    font_size: 14
                    alignment: center
                    color:
                      default:
                        hex: "#FFFFFF"
                        alpha: 1

      # image_button + stack_image_button row
      - size:
          width: 100%
          height: auto
        margin:
          bottom: 4
          start: 24
          end: 24
        view:
          type: label
          text: "image_button + stack_image_button"
          text_appearance:
            font_size: 12
            alignment: center
            color:
              default:
                hex: "#AAAAAA"
                alpha: 1

      - size:
          width: 100%
          height: auto
        margin:
          bottom: 20
          start: 24
          end: 24
        view:
          type: linear_layout
          direction: horizontal
          items:
            # image_button — swapped via visibility (no view_overrides for image)
            - size:
                width: auto
                height: auto
              position:
                horizontal: center
                vertical: center
              view:
                type: linear_layout
                direction: vertical
                items:
                  - size:
                      width: auto
                      height: auto
                    margin:
                      bottom: 4
                    view:
                      type: label
                      text: "image_button"
                      text_appearance:
                        font_size: 11
                        alignment: center
                        color:
                          default:
                            hex: "#999999"
                            alpha: 1
                  - size:
                      width: 72
                      height: 72
                    view:
                      type: image_button
                      identifier: img_btn
                      image:
                        type: url
                        url: "https://picsum.photos/seed/imgbtn-light/144/144"
                        url_selectors:
                          - dark_mode: true
                            url: "https://picsum.photos/seed/imgbtn-dark/144/144"
                      view_overrides:
                        image:
                          - when_state_matches:
                              key: alt
                              value:
                                equals: true
                            value:
                              type: url
                              url: "https://picsum.photos/seed/imgbtn-alt-light/144/144"
                              url_selectors:
                                - dark_mode: true
                                  url: "https://picsum.photos/seed/imgbtn-alt-dark/144/144"
                      border:
                        radius: 12

            # stack_image_button — swaps items via view_overrides
            - size:
                width: auto
                height: auto
              position:
                horizontal: center
                vertical: center
              view:
                type: linear_layout
                direction: vertical
                items:
                  - size:
                      width: auto
                      height: auto
                    margin:
                      bottom: 4
                    view:
                      type: label
                      text: "stack_image_button"
                      text_appearance:
                        font_size: 11
                        alignment: center
                        color:
                          default:
                            hex: "#999999"
                            alpha: 1
                  - size:
                      width: 72
                      height: 72
                    view:
                      type: stack_image_button
                      identifier: stack_btn
                      items:
                        - type: image_url
                          url: "https://picsum.photos/seed/stack-light/144/144"
                          url_selectors:
                            - dark_mode: true
                              url: "https://picsum.photos/seed/stack-dark/144/144"
                          media_fit: fit_crop
                      view_overrides:
                        items:
                          - when_state_matches:
                              key: alt
                              value:
                                equals: true
                            value:
                              - type: image_url
                                url: "https://picsum.photos/seed/stack-alt-light/144/144"
                                url_selectors:
                                  - dark_mode: true
                                    url: "https://picsum.photos/seed/stack-alt-dark/144/144"
                                media_fit: fit_crop
                      border:
                        radius: 12

      - size:
          width: 100%
          height: 48
        margin:
          bottom: 20
          start: 24
          end: 24
        view:
          type: label_button
          identifier: cta_btn
          button_click: [dismiss]
          background_color:
            default:
              hex: "#007AFF"
              alpha: 1
          border:
            radius: 12
          label:
            type: label
            text: "Got It"
            text_appearance:
              font_size: 16
              alignment: center
              styles: [bold]
              color:
                default:
                  hex: "#FFFFFF"
                  alpha: 1
