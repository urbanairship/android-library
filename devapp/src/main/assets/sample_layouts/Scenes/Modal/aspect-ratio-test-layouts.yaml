                  - size:
                      width: 50%
                      height: auto
                    margin:
                      top: 8
                      bottom: 8
                      start: 4
                      end: 8
                    view:
                      type: label_button
                      identifier: page6_next
                      background_color:
                        default:
                          hex: '#888888'
                          alpha: 1
                      border:
                        radius: 8
                      button_click:
