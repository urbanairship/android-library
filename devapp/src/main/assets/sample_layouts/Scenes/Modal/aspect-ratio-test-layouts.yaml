      # PAGE 7 — Both-auto in fixed-size container (both maxW and maxH known)
      # width:auto, height:auto, aspect_ratio:1.0 inside a 100%/100% container.
      # Max bounds are ratio-constrained to a square from min(modalW, modalH).
      - identifier: page_7
        type: pager_item
        view:
          type: linear_layout
          direction: vertical
          items:
            - size:
                width: 100%
                height: auto
              margin:
                top: 12
                bottom: 6
                start: 12
                end: 12
              view:
                type: label
                text: "Page 7 — Both-auto, fixed parent: width:auto, height:auto, aspect_ratio:1.0. Max bounds ratio-constrained to square from min(W,H)."
                text_appearance:
                  font_size: 12
                  alignment: center
                  color:
                    default:
                      hex: '#666666'
                      alpha: 1
            - size:
                width: 100%
                height: 100%
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: auto
                      height: auto
                      aspect_ratio: 1.0
                    view:
                      type: empty_view
                      background_color:
                        default:
                          hex: '#6C5CE7'
                          alpha: 1
                      border:
                        radius: 4
                  - position:
                      horizontal: center
                      vertical: bottom
                    size:
                      width: 100%
                      height: auto
                    margin:
                      bottom: 8
                      start: 12
                      end: 12
                    view:
                      type: linear_layout
                      direction: horizontal
                      items:
                        - size:
                            width: 50%
                            height: auto
                          margin:
                            top: 8
                            bottom: 8
                            start: 8
                            end: 4
                          view:
                            type: label_button
                            identifier: page7_back
                            background_color:
                              default:
                                hex: '#888888'
                                alpha: 1
                            border:
                              radius: 8
                            button_click:
                              - pager_previous
                            label:
                              type: label
                              text: Back
                              text_appearance:
                                font_size: 14
                                alignment: center
                                color:
                                  default:
                                    hex: '#FFFFFF'
                                    alpha: 1
                        - size:
                            width: 50%
                            height: auto
                          margin:
                            top: 8
                            bottom: 8
                            start: 4
                            end: 8
                          view:
                            type: label_button
                            identifier: page7_next
                            background_color:
                              default:
                                hex: '#888888'
                                alpha: 1
                            border:
                              radius: 8
                            button_click:
                              - pager_next
                            label:
                              type: label
                              text: "Next →"
                              text_appearance:
                                font_size: 14
                                alignment: center
                                color:
                                  default:
                                    hex: '#FFFFFF'
                                    alpha: 1

      # PAGE 8 — Both-auto, only width bound (auto-height linear_layout item)
      # width:auto, height:auto, aspect_ratio:1.778. maxW = modalW, maxH = modalH.
      # Ratio-constrained: max becomes landscape 16:9 box within modal.
      - identifier: page_8
        type: pager_item
        view:
          type: linear_layout
          direction: vertical
          items:
            - size:
                width: 100%
                height: auto
              margin:
                top: 12
                bottom: 6
                start: 12
                end: 12
              view:
                type: label
                text: "Page 8 — Both-auto linear item: width:auto, height:auto, aspect_ratio:1.778. Max bounds are ratio-constrained to 16:9 within modal."
                text_appearance:
                  font_size: 12
                  alignment: center
                  color:
                    default:
